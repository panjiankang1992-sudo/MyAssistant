name: ai_assistant
description: AI Personal Assistant
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.11.1 <4.0.0'
  flutter: ^3.41.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^3.2.1
  go_router: ^17.2.3
  drift: ^2.33.0
  drift_flutter: ^0.3.0
  sqlite3: 3.3.1
  sqlite3_flutter_libs: ^0.6.0+eol
  path_provider: ^2.1.5
  shared_preferences: ^2.5.3
  freezed_annotation: ^3.1.0
  cupertino_icons: ^1.0.9
  flutter_animate: ^4.5.0
  uuid: ^4.4.0
  intl: ^0.20.2
  flutter_svg: ^2.0.17
  flutter_markdown_plus: ^1.0.7
  speech_to_text: ^7.4.0
  file_picker: ^8.0.0
  url_launcher: ^6.3.2
  open_filex: ^4.7.0
  connectivity_plus: ^7.1.1
  webdav_plus: ^1.2.2
  pointycastle: ^4.0.0
  http: ^1.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.15.0
  drift_dev: ^2.33.0
  freezed: ^3.2.5
  xml: ^6.6.1

hooks:
  user_defines:
    sqlite3:
      source: system

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/avatars/
    - assets/bookkeeping_icons/
